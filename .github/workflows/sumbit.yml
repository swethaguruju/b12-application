# .github/workflows/submit.yml
#
# Place this file at .github/workflows/submit.yml in your repository.
# Then add the following repository secrets (Settings → Secrets and variables → Actions):
#
#   B12_SIGNING_SECRET  → hello-there-from-b12
#   APPLICANT_NAME      → Your full name
#   APPLICANT_EMAIL     → your@email.com
#   RESUME_LINK         → https://link-to-your-resume-or-linkedin
#
# The REPOSITORY_LINK and ACTION_RUN_LINK are derived automatically from
# GitHub's built-in context variables.

name: B12 Application Submission

on:
  # Trigger manually from the Actions tab whenever you're ready to submit.
  workflow_dispatch:

jobs:
  submit:
    name: Submit application to B12
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run submission script
        env:
          # Personal details – stored as repository secrets
          B12_SIGNING_SECRET: ${{ secrets.B12_SIGNING_SECRET }}
          APPLICANT_NAME:     ${{ secrets.APPLICANT_NAME }}
          APPLICANT_EMAIL:    ${{ secrets.APPLICANT_EMAIL }}
          RESUME_LINK:        ${{ secrets.RESUME_LINK }}

          # Derived automatically from the CI context
          REPOSITORY_LINK: ${{ github.server_url }}/${{ github.repository }}
          ACTION_RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        run: python submit.py
