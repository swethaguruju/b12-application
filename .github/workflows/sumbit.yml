name: B12 Application Submission

on:
  workflow_dispatch:

jobs:
  submit:
    name: Submit application to B12
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run submission script
        env:
          B12_SIGNING_SECRET: ${{ secrets.B12_SIGNING_SECRET }}
          APPLICANT_NAME:     "Swetha G"       
          APPLICANT_EMAIL:    "swethaguruju04@gmail.com" 
          RESUME_LINK:        ${{ secrets.RESUME_LINK }}
          REPOSITORY_LINK: ${{ github.server_url }}/${{ github.repository }}
          ACTION_RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python submit.py
